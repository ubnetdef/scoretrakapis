version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/ScoreTrak/scoretrakapis/gen/proto/go
plugins:
  - name: go
    out: gen/proto/go
    opt:
      - paths=source_relative
  - name: go-grpc
    out: gen/proto/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  - plugin: buf.build/protocolbuffers/js
    out: gen/ts
    opt:
      - import_style=commonjs
  - plugin: buf.build/grpc/web
    out: gen/ts
    opt:
      - import_style=typescript
      - mode=grpcwebtext